server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — كل المسارات تُخدَم من index.html (React Router في Phase 2).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # تخزين مؤقت طويل للأصول المُبصَمة (hashed assets).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
