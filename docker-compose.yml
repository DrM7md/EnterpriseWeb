# تشغيل محلي/Staging. أسرار الإنتاج تُدار عبر Azure Key Vault لا هنا.
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD:-Your_strong_Pass123}"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  api:
    build:
      context: .
      dockerfile: src/API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__Default: "Server=db;Database=EnterpriseSystem;User Id=sa;Password=${DB_PASSWORD:-Your_strong_Pass123};TrustServerCertificate=True"
    ports:
      - "7001:8080"
    depends_on:
      - db

  client:
    build:
      context: ./client
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  mssql-data:
